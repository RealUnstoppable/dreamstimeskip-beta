<!DOCTYPE html>
<html lang="en">
<head>
    <script type="module" src="/js/theme-loader.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In / Sign Up</title>
    <link rel="icon" type="image/png" href="/images/dreams-favicon.png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/themes.css">
    <style>
        body {font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-primary); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;}
        .container {max-width: 400px; width: 100%; padding: 20px;}
        .form-container {background-color: var(--primary-card-color); padding: 40px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); text-align: center;}
        h1 {margin-bottom: 25px; color: #fff; font-weight: 600;}
        .input-group {margin-bottom: 20px; text-align: left;}
        label {display: block; margin-bottom: 8px; color: #a0a0a0; font-size: 14px;}
        input {width: 100%; padding: 12px; border: 1px solid #333; background-color: #2c2c2c; color: #e0e0e0; border-radius: 5px; box-sizing: border-box; font-size: 16px;}
        button {width: 100%; padding: 12px; border: none; background-color: var(--accent-color); color: #fff; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;}
        button:hover {background-color: #0056b3;}
        .toggle-link {margin-top: 20px; color: var(--accent-color); cursor: pointer; font-size: 14px;}
        #message {margin-top: 15px; color: #ff4d4d; font-size: 14px; height: 20px;}
    </style>
</head>
<body>
    <header class="main-header"></header>
    <div class="container">
        <div class="form-container" id="form-container">
            <h1 id="form-title">Sign In</h1>
            <form id="auth-form">
                <div class="input-group" id="email-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="input-group" id="password-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" id="submit-btn">Sign In</button>
                <p id="message"></p>
                <a href="#" class="toggle-link" id="toggle-form">Don't have an account? Sign Up</a>
            </form>
        </div>
    </div>
    <footer class="main-footer"></footer>
    <script type="module">
        import { auth, db } from '/js/auth.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        // Authentication handling logic (add as needed)
    </script>
    <script type="module">
        import { loadNavbar } from './js/navbar.js';
        import { loadFooter } from './js/footer.js';
        if (typeof loadNavbar === 'function') loadNavbar();
        if (typeof loadFooter === 'function') loadFooter();
    </script>
</body>
</html>
