<!DOCTYPE html>
<html lang="en">
<head>
    <script type="module" src="/js/theme-loader.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In / Sign Up | Unstoppable</title>
    <link rel="icon" type="image/png" href="/images/dreams-favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/themes.css">
    <style>
        .auth-main {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 100px); /* Adjust based on header height */
            padding: 40px 20px;
        }

        .auth-container {
            background-color: var(--primary-card-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            /* Glassmorphism effects handled by themes.css, but added for safety */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .auth-container h1 {
            margin-bottom: 30px;
            font-size: 2rem;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-primary);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-group input:focus {
            border-color: var(--accent-blue, #2563EB);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.3);
            outline: none;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            border: none;
            background-color: var(--accent-blue, #2563EB);
            color: #ffffff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background-color 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        .auth-btn:hover {
            background-color: #1D4ED8;
            transform: translateY(-2px);
        }

        .auth-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
            transform: none;
        }

        .toggle-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--accent-blue, #2563EB);
            cursor: pointer;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .toggle-link:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        #message {
            margin-top: 20px;
            color: #ef4444; /* Error red */
            font-size: 0.9rem;
            font-weight: 500;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <header class="main-header" style="position: relative; z-index: 50;">
        <div id="navbar-placeholder"></div>
    </header>

    <main class="auth-main">
        <div class="auth-container">
            <h1 id="form-title">Sign In</h1>
            <form id="auth-form">
                <div class="input-group" id="username-group" style="display: none;">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username">
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" id="submit-btn" class="auth-btn">Sign In</button>
            </form>
            <p id="message" role="alert"></p>
            <a href="#" class="toggle-link" id="toggle-form">Don't have an account? Sign Up</a>
        </div>
    </main>

    <footer class="main-footer"></footer>

    <script type="module">
        import { loadNavbar } from './js/navbar.js';
        import { loadFooter } from './js/footer.js';
        import { auth, db } from './js/auth.js'; // This imports auth.js, triggering the event listeners for auth-form

        document.addEventListener('DOMContentLoaded', () => {
            loadNavbar();
            loadFooter();
        });
    </script>
    <script src="/js/script.js"></script>
</body>
</html>
