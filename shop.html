<!DOCTYPE html>
<html lang="en">

<head>
    <script type="module" src="/js/theme-loader.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merch Store | DTS HUB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="icon" type="image/png" href="/images/Unstoppable Collection Logo.png">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/shop.css">
    <link rel="stylesheet" href="/css/themes.css">
</head>

<body>
    <header class="main-header">
    </header>

    <main class="shop-main">
        <section class="shop-header">
            <h1>Unstoppable Collection</h1>
            <p>High-quality gear for the dedicated fan. Log in to save your cart.</p>
        </section>

        <section id="product-grid" class="product-grid">
        </section>
    </main>

    <button id="cart-button" class="cart-fab" aria-label="View cart">
        <span id="cart-icon">🛒</span>
        <span id="cart-item-count" class="cart-item-count">0</span>
    </button>

    <div id="cart-modal" class="cart-modal">
        <div class="cart-modal-content">
            <div class="cart-modal-header">
                <h2>Your Cart</h2>
                <button id="close-cart-btn" class="close-cart-btn" aria-label="Close cart">&times;</button>
            </div>
            <div id="cart-items-container" class="cart-items-container">
            </div>
            <div class="cart-modal-footer">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cart-total-price">$0.00</span>
                </div>
                <button id="checkout-btn" class="btn-checkout" disabled>Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <!-- Review Modal -->
    <div id="review-modal" class="review-modal" style="display: none;">
        <div class="review-modal-content">
            <div class="review-modal-header">
                <h2>Product Reviews</h2>
                <button id="close-review-btn" class="close-review-btn" aria-label="Close reviews">&times;</button>
            </div>

            <div class="review-stats" id="review-stats">
                <div class="avg-rating">
                    <span id="avg-rating-value">0.0</span> <span class="star-rating">★</span>
                </div>
                <div class="total-reviews" id="total-reviews-count">0 reviews</div>
            </div>

            <div id="reviews-list-container" class="reviews-list-container">
                <!-- Reviews will be injected here -->
            </div>

            <div id="write-review-section" class="write-review-section" style="display: none;">
                <h3>Write a Review</h3>
                <form id="write-review-form">
                    <div class="rating-input">
                        <label for="review-rating">Rating (1-5):</label>
                        <select id="review-rating" required>
                            <option value="5">5 Stars</option>
                            <option value="4">4 Stars</option>
                            <option value="3">3 Stars</option>
                            <option value="2">2 Stars</option>
                            <option value="1">1 Star</option>
                        </select>
                    </div>
                    <div class="comment-input">
                        <textarea id="review-comment" rows="4" placeholder="Share your thoughts about this product..." required></textarea>
                    </div>
                    <button type="submit" id="submit-review-btn" class="submit-review-btn">Submit Review</button>
                    <div id="review-message" class="review-message"></div>
                </form>
            </div>
            <div id="login-to-review-msg" class="login-to-review-msg" style="display: none;">
                <p>Please <a href="sign in beta.html">log in</a> to write a review.</p>
            </div>
        </div>
    </div>

    <footer class="main-footer"></footer>


    <script type="module">
        import { loadNavbar } from './js/navbar.js';
        import { loadFooter } from './js/footer.js'; // Add this line

        loadNavbar();
        loadFooter();
    </script>
    <script type="module" src="/js/shop.js"></script>


    </script>


    <script type="module">
        import { auth, db } from '/js/auth.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
    </script>
