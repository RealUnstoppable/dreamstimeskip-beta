<!DOCTYPE html>
<html lang="en">

<head>
    <script type="module" src="/js/theme-loader.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merch Store | DTS HUB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="icon" type="image/png" href="/images/Unstoppable Collection Logo.png">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/shop.css">
    <link rel="stylesheet" href="/css/themes.css">
</head>

<body>
    <header class="main-header">
    </header>

    <main class="shop-main">
        <section class="shop-header">
            <h1>Unstoppable Collection</h1>
            <p>High-quality gear for the dedicated fan. Log in to save your cart.</p>
        </section>

        <section id="product-grid" class="product-grid">
        </section>
    </main>

    <button id="cart-button" class="cart-fab" aria-label="View cart">
        <span id="cart-icon">🛒</span>
        <span id="cart-item-count" class="cart-item-count">0</span>
    </button>

    <!-- Product Details / Reviews Modal -->
    <div id="product-details-modal" class="cart-modal" style="display: none;">
        <div class="cart-modal-content" style="max-width: 600px;">
            <div class="cart-modal-header">
                <h2 id="details-modal-title">Product Details</h2>
                <button id="close-details-btn" class="close-cart-btn" aria-label="Close details">&times;</button>
            </div>

            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <img id="details-modal-img" src="" alt="" style="width: 150px; height: 150px; object-fit: cover; border-radius: 8px;">
                <div>
                    <h3 id="details-modal-name" style="margin-top: 0;"></h3>
                    <p id="details-modal-price" style="font-weight: bold; color: var(--accent-blue);"></p>
                    <p id="details-modal-desc" style="color: var(--text-secondary); font-size: 0.9rem;"></p>
                </div>
            </div>

            <!-- Reviews Section -->
            <div class="reviews-section">
                <h3>Customer Reviews</h3>
                <div id="reviews-list" class="reviews-container">
                    <p style="color: var(--text-secondary);">Loading reviews...</p>
                </div>

                <!-- Review Form (Visible only if logged in) -->
                <div id="review-form-wrapper" class="review-form-container" style="display: none;">
                    <h4>Write a Review</h4>
                    <form id="review-form" class="review-form">
                        <input type="hidden" id="review-product-id">

                        <div class="rating-input">
                            <input type="radio" id="star5" name="rating" value="5" required />
                            <label for="star5" title="5 stars">★</label>

                            <input type="radio" id="star4" name="rating" value="4" />
                            <label for="star4" title="4 stars">★</label>

                            <input type="radio" id="star3" name="rating" value="3" />
                            <label for="star3" title="3 stars">★</label>

                            <input type="radio" id="star2" name="rating" value="2" />
                            <label for="star2" title="2 stars">★</label>

                            <input type="radio" id="star1" name="rating" value="1" />
                            <label for="star1" title="1 star">★</label>
                        </div>

                        <textarea id="review-comment" class="review-textarea" placeholder="Share your thoughts about this product..." required></textarea>

                        <button type="submit" id="submit-review-btn" class="btn-submit-review">Submit Review</button>
                    </form>
                </div>
                <div id="review-login-prompt" style="margin-top: 1.5rem; text-align: center; display: none;">
                    <p><a href="sign in beta.html" style="color: var(--accent-blue);">Log in</a> to leave a review.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="cart-modal">
        <div class="cart-modal-content">
            <div class="cart-modal-header">
                <h2>Your Cart</h2>
                <button id="close-cart-btn" class="close-cart-btn" aria-label="Close cart">&times;</button>
            </div>
            <div id="cart-items-container" class="cart-items-container">
            </div>
            <div class="cart-modal-footer">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cart-total-price">$0.00</span>
                </div>
                <button id="checkout-btn" class="btn-checkout" disabled>Proceed to Checkout</button>
            </div>
        </div>
    </div>
    <footer class="main-footer"></footer>


    <script type="module">
        import { loadNavbar } from './js/navbar.js';
        import { loadFooter } from './js/footer.js'; // Add this line

        loadNavbar();
        loadFooter();
    </script>
    <script type="module" src="/js/shop.js"></script>


    </script>


    <script type="module">
        import { auth, db } from '/js/auth.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
    </script>
