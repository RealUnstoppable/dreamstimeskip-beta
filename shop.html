<!DOCTYPE html>
<html lang="en">

<head>
    <script type="module" src="/js/theme-loader.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merch Store | DTS HUB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="icon" type="image/png" href="/images/Unstoppable Collection Logo.png">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/shop.css">
    <link rel="stylesheet" href="/css/themes.css">
</head>

<body>
    <header class="main-header">
    </header>

    <main class="shop-main">
        <section class="shop-header">
            <h1>Unstoppable Collection</h1>
            <p>High-quality gear for the dedicated fan. Log in to save your cart.</p>
        </section>

        <section id="product-grid" class="product-grid">
        </section>
    </main>

    <button id="cart-button" class="cart-fab" aria-label="View cart">
        <span id="cart-icon">🛒</span>
        <span id="cart-item-count" class="cart-item-count">0</span>
    </button>

    <div id="cart-modal" class="cart-modal">
        <div class="cart-modal-content">
            <div class="cart-modal-header">
                <h2>Your Cart</h2>
                <button id="close-cart-btn" class="close-cart-btn" aria-label="Close cart">&times;</button>
            </div>
            <div id="cart-items-container" class="cart-items-container">
            </div>
            <div class="cart-modal-footer">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cart-total-price">$0.00</span>
                </div>
                <button id="checkout-btn" class="btn-checkout" disabled>Proceed to Checkout</button>
            </div>
        </div>
    </div>
    <!-- Reviews Modal -->
    <div id="reviews-modal" class="cart-modal">
        <div class="cart-modal-content reviews-modal-content">
            <div class="cart-modal-header">
                <h2>Product Reviews</h2>
                <button id="close-reviews-btn" class="close-cart-btn" aria-label="Close reviews">&times;</button>
            </div>
            <div id="reviews-list-container" class="cart-items-container" style="margin-bottom: 20px;">
                <!-- Reviews will be injected here -->
            </div>
            <div class="reviews-modal-footer">
                <h3>Leave a Review</h3>
                <form id="review-submit-form" style="display: flex; flex-direction: column; gap: 10px;">
                    <input type="hidden" id="review-product-id">
                    <select id="review-rating" required style="padding: 10px; background: #2c2c2c; color: white; border: 1px solid var(--border-color); border-radius: 5px;">
                        <option value="" disabled selected>Select Rating</option>
                        <option value="5">5 Stars</option>
                        <option value="4">4 Stars</option>
                        <option value="3">3 Stars</option>
                        <option value="2">2 Stars</option>
                        <option value="1">1 Star</option>
                    </select>
                    <textarea id="review-text" required placeholder="Write your review here..." style="padding: 10px; background: #2c2c2c; color: white; border: 1px solid var(--border-color); border-radius: 5px; min-height: 80px;"></textarea>
                    <button type="submit" class="add-to-cart-btn" style="width: 100%;">Submit Review</button>
                    <p id="review-auth-message" style="color: var(--accent-red); display: none; font-size: 0.9em; text-align: center;">You must be logged in to leave a review.</p>
                </form>
            </div>
        </div>
    </div>
    <footer class="main-footer"></footer>


    <script type="module">
        import { loadNavbar } from './js/navbar.js';
        import { loadFooter } from './js/footer.js'; // Add this line

        loadNavbar();
        loadFooter();
    </script>
    <script type="module" src="/js/shop.js"></script>


    </script>


    <script type="module">
        import { auth, db } from '/js/auth.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
    </script></body>
</html>
