<!DOCTYPE html>
<html lang="en">

<head>
    <script type="module" src="/js/theme-loader.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merch Store | DTS HUB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="icon" type="image/png" href="/images/Unstoppable Collection Logo.png">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/shop.css">
    <link rel="stylesheet" href="/css/themes.css">
</head>

<body>
    <header class="main-header">
    </header>

    <main class="shop-main">
        <section class="shop-header">
            <h1>Unstoppable Collection</h1>
            <p>High-quality gear for the dedicated fan. Log in to save your cart.</p>
        </section>

        <section id="product-grid" class="product-grid">
        </section>
    </main>

    <button id="cart-button" class="cart-fab" aria-label="View cart">
        <span id="cart-icon">🛒</span>
        <span id="cart-item-count" class="cart-item-count">0</span>
    </button>

    <!-- Reviews Modal -->
    <div id="reviews-modal" class="cart-modal">
        <div class="cart-modal-content">
            <div class="cart-modal-header">
                <h2 id="reviews-modal-title">Product Reviews</h2>
                <button id="close-reviews-btn" class="close-cart-btn" aria-label="Close reviews">&times;</button>
            </div>

            <div class="reviews-summary" id="reviews-summary">
                <div class="average-rating" id="modal-average-rating">0.0</div>
                <div class="stars-display" id="modal-stars-display">★★★★★</div>
                <div class="review-count" id="modal-review-count">0 reviews</div>
            </div>

            <div id="review-submission-section" class="review-submission-section" style="display: none;">
                <h3>Write a Review</h3>
                <form id="review-form">
                    <div class="star-rating-input" id="star-rating-input" role="radiogroup" aria-label="Rating">
                        <span class="star-input" data-value="1" role="radio" aria-checked="false" tabindex="0">★</span>
                        <span class="star-input" data-value="2" role="radio" aria-checked="false" tabindex="0">★</span>
                        <span class="star-input" data-value="3" role="radio" aria-checked="false" tabindex="0">★</span>
                        <span class="star-input" data-value="4" role="radio" aria-checked="false" tabindex="0">★</span>
                        <span class="star-input" data-value="5" role="radio" aria-checked="false" tabindex="0">★</span>
                    </div>
                    <textarea id="review-text" placeholder="Share your thoughts about this product..." required aria-label="Review text"></textarea>
                    <button type="submit" class="btn-checkout" id="submit-review-btn">Submit Review</button>
                    <div id="review-notification" class="notification"></div>
                </form>
            </div>
            <div id="login-prompt-section" class="login-prompt-section">
                <p>Please <a href="sign in beta.html">log in</a> to write a review.</p>
            </div>

            <div id="reviews-list-container" class="reviews-list-container">
                <p style="color: var(--text-secondary); text-align: center; margin-top: 20px;">Loading reviews...</p>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="cart-modal">
        <div class="cart-modal-content">
            <div class="cart-modal-header">
                <h2>Your Cart</h2>
                <button id="close-cart-btn" class="close-cart-btn" aria-label="Close cart">&times;</button>
            </div>
            <div id="cart-items-container" class="cart-items-container">
            </div>
            <div class="cart-modal-footer">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cart-total-price">$0.00</span>
                </div>
                <button id="checkout-btn" class="btn-checkout" disabled>Proceed to Checkout</button>
            </div>
        </div>
    </div>
    <footer class="main-footer"></footer>


    <script type="module">
        import { loadNavbar } from './js/navbar.js';
        import { loadFooter } from './js/footer.js'; // Add this line

        loadNavbar();
        loadFooter();
    </script>
    <script type="module" src="/js/shop.js"></script>


    </script>


    <script type="module">
        import { auth, db } from '/js/auth.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
    </script>
