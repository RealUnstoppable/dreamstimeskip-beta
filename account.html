<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | ezManage</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif; background-color: #111827; color: #f3f4f6; margin: 0; padding: 40px 20px; display: flex; justify-content: center;
        }
        .container { max-width: 800px; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #374151; padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { margin: 0; }
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; border: none; cursor: pointer; text-decoration: none; display: inline-block;}
        .btn-outline { background: transparent; border: 1px solid #4b5563; color: white; }
        .btn-outline:hover { background: #374151; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-primary { background: #2563eb; color: white; }
        .card { background: #1f2937; border: 1px solid #374151; padding: 25px; border-radius: 12px; margin-bottom: 25px; }
        .card h3 { margin-top: 0; border-bottom: 1px solid #374151; padding-bottom: 10px; color: #60a5fa;}
        .data-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 1.05rem;}
        .data-label { color: #9ca3af; font-weight: 500; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; }
        .badge.pro { background: rgba(37, 99, 235, 0.2); color: #60a5fa; border: 1px solid #2563eb;}
        .badge.free { background: rgba(107, 114, 128, 0.2); color: #9ca3af; border: 1px solid #4b5563;}
    </style>
</head>
<body>
    <div class="container" id="app-container" style="display: none;">
        <div class="header">
            <h1>Manager Profile</h1>
            <div>
                <a href="tracker.html" class="btn btn-primary">Back to Tracker</a>
                <button id="sign-out-btn" class="btn btn-outline">Sign Out</button>
            </div>
        </div>

        <div class="card">
            <h3>Personal Information</h3>
            <div class="data-row"><span class="data-label">Name:</span> <span id="user-name">...</span></div>
            <div class="data-row"><span class="data-label">Email:</span> <span id="user-email">...</span></div>
            <div class="data-row"><span class="data-label">Joined:</span> <span id="user-joined">...</span></div>
        </div>

        <div class="card">
            <h3>Subscription Status</h3>
            <div class="data-row">
                <span class="data-label">Current Tier:</span> 
                <span id="sub-badge" class="badge free">Free Plan</span>
            </div>
            <p style="color: #9ca3af; font-size: 0.95rem; margin-bottom: 20px;">
                Pro members get access to live multi-device syncing, unlimited history, and data exports.
            </p>
            
            <div id="upgrade-container">
                <a href="memberships.html" class="btn btn-primary">Upgrade to Pro</a>
            </div>
            <div id="cancel-container" style="display: none;">
                <button id="cancel-sub-btn" class="btn btn-danger">Cancel Pro Subscription</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db, cancelSubscription } from '/js/auth.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('app-container').style.display = 'block';
                
                // Fetch User Data from Firestore
                const userDoc = await getDoc(doc(db, "users", user.uid));
                const data = userDoc.exists() ? userDoc.data() : {};

                // Populate UI
                document.getElementById('user-name').textContent = data.name || user.displayName || "Not Set";
                document.getElementById('user-email').textContent = user.email;
                document.getElementById('user-joined').textContent = data.signupDate ? data.signupDate.toDate().toLocaleDateString() : 'N/A';

                // Handle Subscription State
                const isPro = data.subscription?.status === 'active' || data.isPro;
                const subBadge = document.getElementById('sub-badge');
                
                if (isPro) {
                    subBadge.textContent = "Pro Plan";
                    subBadge.className = "badge pro";
                    document.getElementById('upgrade-container').style.display = 'none';
                    document.getElementById('cancel-container').style.display = 'block';

                    // Attach cancel logic
                    const customerId = data.subscription?.customerId;
                    document.getElementById('cancel-sub-btn').addEventListener('click', () => {
                        cancelSubscription(customerId);
                    });
                }
            } else {
                window.location.replace('sign in beta.html');
            }
        });

        document.getElementById('sign-out-btn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.replace('sign in beta.html'));
        });
    </script>
</body>
</html>
